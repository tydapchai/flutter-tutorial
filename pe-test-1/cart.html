<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Shopping Cart</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2111d4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121022",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header -->
<header class="sticky top-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-primary/10 px-6 py-4 flex items-center justify-between">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
</button>
<h1 class="text-xl font-bold tracking-tight">Your Cart</h1>
</div>
<div class="relative">
<span class="material-symbols-outlined">more_vert</span>
</div>
</header>
<!-- Main Content: Product List -->
<main class="flex-1 overflow-y-auto px-6 py-6 space-y-6">
<!-- Cart Item 1 -->
<div class="flex gap-4 p-4 rounded-xl bg-white dark:bg-primary/5 border border-primary/10">
<div class="w-24 h-24 rounded-lg bg-slate-200 dark:bg-primary/20 flex-shrink-0 overflow-hidden">
<img alt="Premium Headphones" class="w-full h-full object-cover" data-alt="Close up of black premium wireless headphones" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDeE0g8bzVnWr6fj6JrpwhlkVvZgcN4ZG-pPLUEoZZ-HILU88OnT-XxVWM70cgHVqyzHgnBVDwZqceNyRFobJciQlANZnX9PFxdYj9QU8Wl9dDdgpQsXn3uLU34wzkk-CIB1q1nwRpd7ugyNFgiGIZKNcE1EpoOvhcUVt6HJ1rOyvJJiWawoUOvizB-wmi0P-WCmeSvgXhLgwlV9Zv1XDDCGwpH1irBUqfIqpCEBAAiwPff2zsPy1a-t7IQBza99H44Zuj8-kh3uXk"/>
</div>
<div class="flex flex-col flex-1 justify-between">
<div class="flex justify-between items-start">
<div>
<h3 class="font-semibold text-base">Premium Wireless Headphones</h3>
<p class="text-sm text-slate-500 dark:text-slate-400">Space Gray</p>
</div>
<button class="text-slate-400 hover:text-red-500 transition-colors">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
<div class="flex justify-between items-center mt-2">
<span class="text-lg font-bold text-primary">$299.00</span>
<div class="flex items-center gap-3 bg-slate-100 dark:bg-primary/20 rounded-full px-2 py-1">
<button class="w-7 h-7 flex items-center justify-center rounded-full bg-white dark:bg-primary/40 text-primary shadow-sm">
<span class="material-symbols-outlined text-[18px]">remove</span>
</button>
<span class="text-sm font-semibold min-w-[1rem] text-center">1</span>
<button class="w-7 h-7 flex items-center justify-center rounded-full bg-primary text-white shadow-md">
<span class="material-symbols-outlined text-[18px]">add</span>
</button>
</div>
</div>
</div>
</div>
<!-- Cart Item 2 -->
<div class="flex gap-4 p-4 rounded-xl bg-white dark:bg-primary/5 border border-primary/10">
<div class="w-24 h-24 rounded-lg bg-slate-200 dark:bg-primary/20 flex-shrink-0 overflow-hidden">
<img alt="Smart Watch" class="w-full h-full object-cover" data-alt="Minimalist white smart watch on white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAt67m873_tBvlHepf4YgseBNZu86fi0l8wy2jMLpcNqqiZDFYD3Z8ZTbOUIyEMhY_KAELcp0ovpIv9_XHr6VymWE0o6v89GTRRp0Q8AeAPU4Rq4vJ6Ija8kHIvuufl__A7W2TmvmOdLLLYuwmIrNWyT678mUSHF3JPz7FoBYNpLk6kOPcTFTUix3NHluEOS5C8CdCjPo6iSm6XRxgue-uBoX5tndD167Am43YZ4jQFnH8ZtDtMjc8Tk7lJ9_JrpUXfQv4BMBGrs7o"/>
</div>
<div class="flex flex-col flex-1 justify-between">
<div class="flex justify-between items-start">
<div>
<h3 class="font-semibold text-base">Smart Watch Series 7</h3>
<p class="text-sm text-slate-500 dark:text-slate-400">Midnight Aluminum</p>
</div>
<button class="text-slate-400 hover:text-red-500 transition-colors">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
<div class="flex justify-between items-center mt-2">
<span class="text-lg font-bold text-primary">$399.00</span>
<div class="flex items-center gap-3 bg-slate-100 dark:bg-primary/20 rounded-full px-2 py-1">
<button class="w-7 h-7 flex items-center justify-center rounded-full bg-white dark:bg-primary/40 text-primary shadow-sm">
<span class="material-symbols-outlined text-[18px]">remove</span>
</button>
<span class="text-sm font-semibold min-w-[1rem] text-center">2</span>
<button class="w-7 h-7 flex items-center justify-center rounded-full bg-primary text-white shadow-md">
<span class="material-symbols-outlined text-[18px]">add</span>
</button>
</div>
</div>
</div>
</div>
<!-- Order Summary Section -->
<div class="mt-8 p-6 rounded-2xl bg-white dark:bg-primary/10 border border-primary/10 space-y-4">
<h2 class="text-lg font-bold mb-2">Order Summary</h2>
<div class="flex justify-between text-sm">
<span class="text-slate-500 dark:text-slate-400">Subtotal</span>
<span class="font-medium text-slate-900 dark:text-slate-100">$1,097.00</span>
</div>
<div class="flex justify-between text-sm">
<span class="text-slate-500 dark:text-slate-400">Shipping</span>
<span class="font-medium text-green-500">Free</span>
</div>
<div class="flex justify-between text-sm">
<span class="text-slate-500 dark:text-slate-400">Tax</span>
<span class="font-medium text-slate-900 dark:text-slate-100">$0.00</span>
</div>
<div class="pt-4 border-t border-primary/10 flex justify-between items-center">
<span class="text-lg font-bold">Total</span>
<span class="text-2xl font-bold text-primary">$1,097.00</span>
</div>
<button class="w-full py-4 bg-primary text-white rounded-xl font-bold text-lg shadow-lg shadow-primary/25 hover:opacity-90 transition-opacity mt-4 flex items-center justify-center gap-2">
                Checkout
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="bg-background-light dark:bg-background-dark border-t border-primary/10 px-6 py-3 flex justify-around items-center">
<a class="flex flex-col items-center gap-1 group" href="#">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors">home</span>
<span class="text-[10px] font-bold text-slate-400 group-hover:text-primary tracking-wider">HOME</span>
</a>
<a class="flex flex-col items-center gap-1 group" href="#">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors">favorite</span>
<span class="text-[10px] font-bold text-slate-400 group-hover:text-primary tracking-wider">FAVORITE</span>
</a>
<a class="flex flex-col items-center gap-1" href="#">
<span class="material-symbols-outlined fill text-primary">shopping_cart</span>
<span class="text-[10px] font-bold text-primary tracking-wider">CART</span>
<div class="w-1 h-1 rounded-full bg-primary mt-0.5"></div>
</a>
</nav>

<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Favorites - Mobile App</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2111d4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121022",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
<div class="relative flex min-h-screen w-full flex-col max-w-md mx-auto bg-background-light dark:bg-background-dark overflow-x-hidden shadow-2xl">
<!-- Header -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10 border-b border-slate-200 dark:border-slate-800">
<div class="text-slate-900 dark:text-white flex size-10 shrink-0 items-center justify-start">
<span class="material-symbols-outlined cursor-pointer">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-tight flex-1 text-center">Favorites</h2>
<div class="flex w-10 items-center justify-end">
<button class="flex cursor-pointer items-center justify-center text-slate-900 dark:text-white">
<span class="material-symbols-outlined">search</span>
</button>
</div>
</div>
<!-- Categories Tabs -->
<div class="pb-3 bg-background-light dark:bg-background-dark">
<div class="flex border-b border-slate-200 dark:border-slate-800 px-4 gap-8">
<a class="flex flex-col items-center justify-center border-b-2 border-primary text-primary pb-3 pt-4" href="#">
<p class="text-sm font-bold tracking-tight">All</p>
</a>
<a class="flex flex-col items-center justify-center border-b-2 border-transparent text-slate-500 dark:text-slate-400 pb-3 pt-4" href="#">
<p class="text-sm font-bold tracking-tight">Clothing</p>
</a>
<a class="flex flex-col items-center justify-center border-b-2 border-transparent text-slate-500 dark:text-slate-400 pb-3 pt-4" href="#">
<p class="text-sm font-bold tracking-tight">Accessories</p>
</a>
</div>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto">
<!-- Favorited Product 1 -->
<div class="p-4 @container">
<div class="flex flex-col items-stretch justify-start rounded-xl @xl:flex-row @xl:items-start shadow-sm bg-white dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 overflow-hidden">
<div class="w-full bg-center bg-no-repeat aspect-video bg-cover" data-alt="Minimal white cotton t-shirt on a clean background" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBMFY1_TylugcaBo0VdbCzC3Obxcj0Cf2aQySbyUyInuUPz9QBfZpsxKuKbpNyGcrn1u4bjEvBB7YK68aOtgM2VHW4yTaDM8J7j5_UfUnmd5IIkE-6kTg3KSv89LvHjPaM7pWVmLhcUyc_xFICp7m_xegdLVmDL79jUUnHeyRJhWRkUQymYnM9Ym86a5x09hZw_L2VrbwsdjQUts7ftyLgQ4g7iux5TQmdibRBxpOtDanDo4m7judkiGAGzuggu2xpV1jF8Tw0l_LY");'></div>
<div class="flex w-full min-w-72 grow flex-col items-stretch justify-center gap-1 py-4 px-4">
<p class="text-primary text-xs font-semibold uppercase tracking-wider">New Arrival</p>
<p class="text-slate-900 dark:text-white text-lg font-bold leading-tight">Premium Cotton Tee</p>
<div class="flex items-end gap-3 justify-between mt-2">
<div class="flex flex-col">
<p class="text-slate-900 dark:text-slate-100 text-base font-bold">$29.00</p>
<p class="text-slate-500 dark:text-slate-400 text-xs">Available in 4 colors</p>
</div>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center rounded-lg h-9 px-4 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 text-sm font-medium hover:bg-red-50 dark:hover:bg-red-900/20 hover:text-red-600 transition-colors">
<span class="material-symbols-outlined text-sm mr-1">delete</span>
<span class="truncate">Remove</span>
</button>
</div>
</div>
</div>
</div>
<!-- Favorited Product 2 -->
<div class="p-4 @container pt-0">
<div class="flex flex-col items-stretch justify-start rounded-xl @xl:flex-row @xl:items-start shadow-sm bg-white dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 overflow-hidden">
<div class="w-full bg-center bg-no-repeat aspect-video bg-cover" data-alt="Luxurious brown leather weekender travel bag" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCGdTZLQGuWIe57zEyzUA8eWZiZIiIZojWATgUifK9uanlkTjYs0iecNX8fCMvIPzZXrV1XwmNU2qzW8W9Vjs4KWjx-ClJ8tXkJK5RxwzyJIQaz96JTIKbIwkw7PjBVpu-yI1kpfHAdEgixFOi9kggx1KirNV7fTHs5euz0OJW2HAYNl4kZlAeERmaQce6mKl8w5UWZvp_nDnEjWzsG5ZBBd1smhLqWjQOOE0Ose4LlQ3e_q98mZn2sKOoGdZhUbXCyqAG07XRrVys");'></div>
<div class="flex w-full min-w-72 grow flex-col items-stretch justify-center gap-1 py-4 px-4">
<p class="text-primary text-xs font-semibold uppercase tracking-wider">Best Seller</p>
<p class="text-slate-900 dark:text-white text-lg font-bold leading-tight">Leather Weekender Bag</p>
<div class="flex items-end gap-3 justify-between mt-2">
<div class="flex flex-col">
<p class="text-slate-900 dark:text-slate-100 text-base font-bold">$120.00</p>
<p class="text-slate-500 dark:text-slate-400 text-xs">Genuine high-grain leather</p>
</div>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center rounded-lg h-9 px-4 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 text-sm font-medium hover:bg-red-50 dark:hover:bg-red-900/20 hover:text-red-600 transition-colors">
<span class="material-symbols-outlined text-sm mr-1">delete</span>
<span class="truncate">Remove</span>
</button>
</div>
</div>
</div>
</div>
</div>
<!-- Bottom Navigation Bar -->
<div class="flex gap-2 border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-4 pb-6 pt-2 sticky bottom-0">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">home</span>
<p class="text-[10px] font-medium leading-normal">Home</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined fill">favorite</span>
<p class="text-[10px] font-medium leading-normal">Favorites</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">shopping_cart</span>
<p class="text-[10px] font-medium leading-normal">Cart</p>
</a>
</div>
</div>
</body></html>
